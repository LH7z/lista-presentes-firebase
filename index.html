<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Presentes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <nav class="bg-white shadow-md p-4 flex justify-between items-center">
    <h1 class="text-lg font-bold">🎁 Lista</h1>
    <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-sm">
      Sair
    </button>
  </nav>

  <div class="max-w-5xl mx-auto p-4">

    <div class="text-center mb-6">
      <h1 class="text-2xl md:text-3xl font-bold text-gray-800">Minha Lista de Aniversário 🎉</h1>
      <input
        type="text"
        id="searchInput"
        placeholder="Pesquisar presente..."
        class="mt-4 w-full md:w-96 px-4 py-2 border rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
      >
    </div>

    <div id="gifts" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>

  </div>

  <div id="popup" class="fixed inset-0 bg-black/40 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-3xl p-6 w-[90%] max-w-sm shadow-2xl scale-95 opacity-0 transition-all duration-200" id="popupBox">
      <h2 class="text-xl font-semibold mb-4">Enviar comprovante</h2>

      <input type="file" id="popupFile" class="w-full text-sm mb-4" />

      <div class="flex gap-2">
        <button onclick="closePopup()" class="flex-1 py-2 rounded-xl bg-gray-100 hover:bg-gray-200 transition">
          Cancelar
        </button>
        <button onclick="confirmPurchase()" class="flex-1 py-2 rounded-xl bg-black text-white hover:scale-105 active:scale-95 transition">
          Confirmar
        </button>
      </div>
    </div>
  </div>



  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <script>

    const firebaseConfig = {
      apiKey: "AIzaSyC63E0_3Hf_vy5LQou1B9NwXAJFum_zYUM",
      authDomain: "lista-de-presente-da-su.firebaseapp.com",
      projectId: "lista-de-presente-da-su",
      storageBucket: "lista-de-presente-da-su.appspot.com",
      messagingSenderId: "647879876295",
      appId: "1:647879876295:web:04d1ca400500b3170728e2",
      measurementId: "G-G8SQBKV969"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      }
    });


  async function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    await auth.createUserWithEmailAndPassword(email, password);
    alert("Conta criada!");
  }

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    await auth.signInWithEmailAndPassword(email, password);
    alert("Logado!");
  }

  async function logout() {
    await auth.signOut();
    window.location.href = "login.html";
  }
  let allGifts = [];
  let selectedGiftId = null;

  function renderGifts(gifts) {
    const container = document.getElementById("gifts");
    container.innerHTML = "";

    gifts.forEach(gift => {
      const div = document.createElement("div");

      div.innerHTML = `
        <div class="overflow-hidden">
            <img src="${gift.imageUrl}" class="w-full h-52 object-cover group-hover:scale-105 transition duration-300">
          </div>

          <div class="p-4 flex flex-col flex-1">
            <h3 class="font-semibold text-lg text-gray-800 line-clamp-1">${gift.name}</h3>
            <p class="text-gray-500 text-sm mt-1">${gift.price ? `R$ ${gift.price}` : "Sem preço"}</p>

            ${gift.reserved && gift.buyerName ? `
              <div class="mt-2 text-xs text-green-600 font-medium">
                ✔ Reservado por ${gift.buyerName}
              </div>
            ` : ""}

            <button
              ${gift.reserved === true ? "disabled" : ""}
              onclick="openPopup('${gift.id}')"
              class="mt-4 py-2 rounded-xl text-sm font-medium transition
              ${gift.reserved === true
                ? "bg-gray-200 text-gray-500 cursor-not-allowed"
                : "bg-gradient-to-r from-black to-gray-800 text-white shadow-md hover:scale-[1.03] active:scale-95"}
              ">
              ${gift.reserved === true ? "Indisponível" : "Reservar 🎁"}
            </button>
          </div>
      `;

      container.appendChild(div);
    });
  }

async function loadGifts() {
  const snapshot = await db.collection("gifts").get();
  allGifts = [];

  snapshot.forEach(doc => {
    allGifts.push({ id: doc.id, ...doc.data() });
  });

  renderGifts(allGifts);
}

window.addEventListener("DOMContentLoaded", () => {
  loadGifts();

  const searchInput = document.getElementById("searchInput");

  if (searchInput) {
    searchInput.addEventListener("input", (e) => {
      const term = e.target.value.toLowerCase();

      const filtered = allGifts.filter(gift =>
        gift.name.toLowerCase().includes(term)
      );

      renderGifts(filtered);
    });
  }
});
  async function loadGifts() {
    const snapshot = await db.collection("gifts").get();
    allGifts = [];

    snapshot.forEach(doc => {
      allGifts.push({ id: doc.id, ...doc.data() });
    });

    renderGifts(allGifts);
  };

  async function uploadReceipt(file) {
    const cloudName = "dft2szczd";
    const uploadPreset = "presentes da su";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", uploadPreset);

    const response = await fetch(
      `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
      {
        method: "POST",
        body: formData
      }
    );

    const data = await response.json();
    console.log("Cloudinary response:", data);
    return data.secure_url;
  }

  async function reserveGift(id) {

    const user = auth.currentUser;

    if (!user) {
      alert("Você precisa estar logado!");
      return;
    }

    const file = document.getElementById(`receiptInput-${id}`).files[0];

    if (!file) {
      alert("Anexe o comprovante!");
      return;
    }

    const receiptUrl = await uploadReceipt(file);

    await db.collection("gifts").doc(id).update({
      reserved: true,
      buyerEmail: user.email,
      receiptUrl: receiptUrl,
      buyerName: user.displayName
    });

    alert("Comprovante enviado com sucesso!");
    loadGifts();
  }
  document.getElementById("searchInput").addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();

    const filtered = allGifts.filter(gift =>
      gift.name.toLowerCase().includes(term)
    );

    renderGifts(filtered);
  });

    function openPopup(id) {
      selectedGiftId = id;
      const popup = document.getElementById("popup");
      const box = document.getElementById("popupBox");

      popup.classList.remove("hidden");

      setTimeout(() => {
        box.classList.remove("scale-95", "opacity-0");
        box.classList.add("scale-100", "opacity-100");
      }, 10);
    }

    function closePopup() {
      const popup = document.getElementById("popup");
      const box = document.getElementById("popupBox");

      box.classList.add("scale-95", "opacity-0");
      box.classList.remove("scale-100", "opacity-100");

      setTimeout(() => {
        popup.classList.add("hidden");
      }, 150);

      selectedGiftId = null;
    }

  async function confirmPurchase() {

    const user = auth.currentUser;

    if (!user) {
      alert("Você precisa estar logado!");
      return;
    }

    const file = document.getElementById("popupFile").files[0];

    if (!file) {
      alert("Selecione um comprovante!");
      return;
    }

    const receiptUrl = await uploadReceipt(file);

    if (!receiptUrl) {
      alert("Erro ao enviar imagem.");
      return;
    }

    await db.collection("gifts").doc(selectedGiftId).update({
      reserved: true,
      buyerEmail: user.email,
      receiptUrl: receiptUrl,
      buyerName: user.displayName
    });

    closePopup();
    loadGifts();
    alert("Comprovante enviado com sucesso!");
  }



  loadGifts();
  console.log("🔥 Firestore conectado com sucesso!", db);
</script>

</body>
</html>
