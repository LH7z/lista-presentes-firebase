<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de presentes</title>
  <link rel="stylesheet" href="style.css">
  <!-- <link rel="stylesheet" href="scripts.js"> -->
</head>
<body>
  <nav>
    <button onclick="logout()">Sair</button>
  </nav>
  <div class="container">
    <div class="seçao-topo">
      <h1>🎁 Minha Lista de Aniversário</h1>
      <input
        type="text"
        id="searchInput"
        placeholder="Pesquisar presente..."
        style="padding:10px; width:300px; margin-bottom:20px;"
      >
    </div>
    <div id="gifts">
    </div>
    <div id="popup" class="popup">
      <div class="popup-content">
        <h3>Anexar comprovante</h3>
        <input type="file" id="popupFile">
        <br><br>
        <button onclick="confirmPurchase()">Confirmar</button>
        <button onclick="closePopup()">Cancelar</button>
      </div>
    </div>
  </div>


  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

  <script>

    const firebaseConfig = {
      apiKey: "AIzaSyC63E0_3Hf_vy5LQou1B9NwXAJFum_zYUM",
      authDomain: "lista-de-presente-da-su.firebaseapp.com",
      projectId: "lista-de-presente-da-su",
      storageBucket: "lista-de-presente-da-su.appspot.com",
      messagingSenderId: "647879876295",
      appId: "1:647879876295:web:04d1ca400500b3170728e2",
      measurementId: "G-G8SQBKV969"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      }
    });


  async function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    await auth.createUserWithEmailAndPassword(email, password);
    alert("Conta criada!");
  }

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    await auth.signInWithEmailAndPassword(email, password);
    alert("Logado!");
  }

  async function logout() {
    await auth.signOut();
    window.location.href = "login.html";
  }
  let allGifts = [];
  let selectedGiftId = null;

  function renderGifts(gifts) {
    const container = document.getElementById("gifts");
    container.innerHTML = "";

    gifts.forEach(gift => {
      const div = document.createElement("div");

      div.innerHTML = `
        <img src="${gift.imageUrl}" width="200">
        <h3>${gift.name}</h3>
        <h4>${gift.price ? `R$ ${gift.price}` : "Preço não informado"}</h4>
         ${gift.reserved && gift.buyerEmail ? `<p>Reservado por: ${gift.buyerEmail}</p>` : ""}
        <button ${gift.reserved ? "disabled" : ""}
          onclick="openPopup('${gift.id}')">
          ${gift.reserved ? "Já comprado 🎉" : "Reservar 🎁"}
        </button>
        <hr>
      `;

      container.appendChild(div);
    });
  }

async function loadGifts() {
  const snapshot = await db.collection("gifts").get();
  allGifts = [];

  snapshot.forEach(doc => {
    allGifts.push({ id: doc.id, ...doc.data() });
  });

  renderGifts(allGifts);
}

window.addEventListener("DOMContentLoaded", () => {
  loadGifts();

  const searchInput = document.getElementById("searchInput");

  if (searchInput) {
    searchInput.addEventListener("input", (e) => {
      const term = e.target.value.toLowerCase();

      const filtered = allGifts.filter(gift =>
        gift.name.toLowerCase().includes(term)
      );

      renderGifts(filtered);
    });
  }
});
  async function loadGifts() {
    const snapshot = await db.collection("gifts").get();
    allGifts = [];

    snapshot.forEach(doc => {
      allGifts.push({ id: doc.id, ...doc.data() });
    });

    renderGifts(allGifts);
  };

    // ===== CLOUDINARY UPLOAD =====
  async function uploadReceipt(file) {
    const cloudName = "dft2szczd";
    const uploadPreset = "presentes da su";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", uploadPreset);

    const response = await fetch(
      `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
      {
        method: "POST",
        body: formData
      }
    );

    const data = await response.json();
    console.log("Cloudinary response:", data);
    return data.secure_url;
  }

  async function reserveGift(id) {

    const user = auth.currentUser;

    if (!user) {
      alert("Você precisa estar logado!");
      return;
    }

    const file = document.getElementById(`receiptInput-${id}`).files[0];

    if (!file) {
      alert("Anexe o comprovante!");
      return;
    }

    // 🔥 ENVIA PARA CLOUDINARY
    const receiptUrl = await uploadReceipt(file);

    // 🔥 SALVA NO FIRESTORE
    await db.collection("gifts").doc(id).update({
      reserved: true,
      buyerEmail: user.email,
      receiptUrl: receiptUrl
    });

    alert("Comprovante enviado com sucesso!");
    loadGifts();
  }
  document.getElementById("searchInput").addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();

    const filtered = allGifts.filter(gift =>
      gift.name.toLowerCase().includes(term)
    );

    renderGifts(filtered);
  });

  function openPopup(id) {
    selectedGiftId = id;
    document.getElementById("popup").style.display = "block";
  }

  function closePopup() {
    selectedGiftId = null;
    document.getElementById("popup").style.display = "none";
  }

  async function confirmPurchase() {

    const user = auth.currentUser;

    if (!user) {
      alert("Você precisa estar logado!");
      return;
    }

    const file = document.getElementById("popupFile").files[0];

    if (!file) {
      alert("Selecione um comprovante!");
      return;
    }

    const receiptUrl = await uploadReceipt(file);

    if (!receiptUrl) {
      alert("Erro ao enviar imagem.");
      return;
    }

    await db.collection("gifts").doc(selectedGiftId).update({
      reserved: true,
      buyerEmail: user.email,
      receiptUrl: receiptUrl
    });

    closePopup();
    loadGifts();
    alert("Comprovante enviado com sucesso!");
  }



  loadGifts();
  console.log("🔥 Firestore conectado com sucesso!", db);
</script>

</body>
</html>
