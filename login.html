<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='24' font-size='24'>🎁</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-200 flex items-center justify-center p-4">
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-black text-white px-5 py-3 rounded-xl shadow-lg opacity-0 pointer-events-none transition-all duration-300">
    Mensagem aqui
  </div>
  <div class="w-full max-w-md">
    <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold">Bem-vindo 👋</h1>
        <p class="text-gray-500 text-sm mt-1">Entre ou crie sua conta</p>
      </div>

      <div class="space-y-4">
        <input
          type="email"
          id="email"
          placeholder="Email"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-black"
        />

        <input
          type="password"
          id="password"
          placeholder="Senha"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-black"
        />

        <input
          type="text"
          id="name"
          placeholder="Seu nome (para cadastro)"
          class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-black"
        />

        <div class="space-y-3 pt-2">
          <button onclick="login()" class="w-full py-3 rounded-xl bg-black text-white font-medium hover:scale-[1.02] active:scale-95 transition">
            Entrar
          </button>

          <button onclick="register()" class="w-full py-3 rounded-xl bg-gray-100 text-gray-800 font-medium hover:bg-gray-200 transition">
            Criar conta
          </button>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <p class="text-center text-xs text-gray-500 mt-4">
      Lista de presentes 🎁
    </p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC63E0_3Hf_vy5LQou1B9NwXAJFum_zYUM",
      authDomain: "lista-de-presente-da-su.firebaseapp.com",
      projectId: "lista-de-presente-da-su",
      storageBucket: "lista-de-presente-da-su.firebasestorage.app",
      messagingSenderId: "647879876295",
      appId: "1:647879876295:web:04d1ca400500b3170728e2",
      measurementId: "G-G8SQBKV969"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await auth.signInWithEmailAndPassword(email, password);

        showToast("Logado com sucesso!");
        window.location.href = "index.html";

      } catch (error) {
        console.error(error);

        // Mensagens amigáveis
        if (error.code === "auth/user-not-found") {
          showToast("Usuário não encontrado 😕");
        } else if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password") {
          showToast("Credenciais inválidas 🔒");
        } else if (error.code === "auth/invalid-email") {
          showToast("Email inválido 📧");
        } else {
          showToast("Erro ao fazer login ❌");
        }
      }
    }

    async function register() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const name = document.getElementById("name").value;

      if (!name) {
        showToast("Por favor, insira seu nome.");
        return;
      }

      await auth.createUserWithEmailAndPassword(email, password);

      const user = auth.currentUser;
      await user.updateProfile({ displayName: name });

      window.location.href = "index.html";
    }

    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    function showToast(message) {
      const toast = document.getElementById("toast");
      if (!toast) {
        console.error("Toast não encontrado no HTML");
        return;
      }

      toast.textContent = message;

      toast.classList.remove("opacity-0", "pointer-events-none");
      toast.classList.add("opacity-100");

      setTimeout(() => {
        toast.classList.add("opacity-0");
        toast.classList.remove("opacity-100");
      }, 3000);
    }

  </script>

</body>
</html>
